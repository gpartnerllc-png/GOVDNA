<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dna Tax AI | Sovereign Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');
        :root { --google-blue: #1a73e8; --bg-light: #f8f9fa; }
        body { font-family: 'Google Sans', sans-serif; background-color: var(--bg-light); color: #202124; height: 100vh; overflow: hidden; }
        .google-card { background: white; border-radius: 16px; box-shadow: 0 1px 3px rgba(60,64,67,0.3); border: 1px solid #dadce0; transition: all 0.2s; }
        .google-card:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(60,64,67,0.15); }
        .sidebar-item { transition: all 0.2s; border-radius: 0 24px 24px 0; text-align: left; width: 100%; border: none; background: transparent; cursor: pointer; }
        .sidebar-item.active { background-color: #e8f0fe; color: var(--google-blue); font-weight: 500; }
        .view-section { display: none; animation: fadeIn 0.3s ease-out; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #fileInput { display: none; }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 shrink-0 z-10">
        <div class="flex items-center gap-4">
            <i data-lucide="shield-check" class="text-blue-600 w-8 h-8"></i>
            <h1 class="text-xl font-medium">Dna Tax <span class="font-bold text-blue-600">Center AI</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <input type="file" id="fileInput" accept=".pfx,.p12" onchange="handleCert(this)">
            <button onclick="document.getElementById('fileInput').click()" class="flex items-center gap-2 border border-gray-300 px-4 py-2 rounded-md hover:bg-gray-50 transition text-sm font-medium">
                <i data-lucide="search" class="w-4 h-4 text-blue-500"></i> BUSCADOR / VINCULAR CERTIFICADO
            </button>
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-400 to-purple-500 shadow-sm"></div>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <aside class="w-64 bg-white border-r border-gray-200 py-6 pr-4 shrink-0">
            <nav class="space-y-1">
                <button onclick="switchView('dashboard')" class="sidebar-item active flex items-center gap-4 py-3 px-6 text-gray-600" data-view="dashboard">
                    <i data-lucide="layout-grid"></i> Dashboard
                </button>
                <button onclick="switchView('notas')" class="sidebar-item flex items-center gap-4 py-3 px-6 text-gray-600" data-view="notas">
                    <i data-lucide="file-text"></i> Notas Fiscais
                </button>
                <button onclick="switchView('balancetes')" class="sidebar-item flex items-center gap-4 py-3 px-6 text-gray-600" data-view="balancetes">
                    <i data-lucide="activity"></i> Impostos (DAS)
                </button>
            </nav>
        </aside>

        <div class="flex-1 overflow-y-auto p-8">
            <div id="view-dashboard" class="view-section active">
                <div class="grid grid-cols-3 gap-8 mb-8">
                    <div class="google-card p-6 border-t-4 border-t-blue-500">
                        <h3 class="text-gray-500 text-xs font-bold uppercase">Total a Pagar</h3>
                        <p class="text-4xl font-bold mt-2" id="tax-value">R$ 0,00</p>
                        <button onclick="showNotification('Pix Gerado', 'success')" class="mt-6 w-full bg-blue-600 text-white py-2 rounded-full font-bold shadow-lg">PAGAR VIA PIX</button>
                    </div>
                    <div class="google-card p-6 border-t-4 border-t-green-500">
                        <h3 class="text-gray-500 text-xs font-bold uppercase">Status Regularidade</h3>
                        <p class="text-2xl font-bold text-green-600 mt-2">SITUAÇÃO REGULAR</p>
                        <p class="text-xs text-gray-400 mt-4" id="sync-status">Aguardando busca...</p>
                    </div>
                    <div class="google-card p-6 bg-blue-50/50">
                        <h3 class="text-blue-600 text-sm font-bold flex items-center gap-2"><i data-lucide="zap"></i> IA INSIGHT</h3>
                        <p class="text-sm mt-4 text-gray-600 italic" id="ia-insight">Puxe o certificado para análise.</p>
                    </div>
                </div>

                <div class="google-card p-8 mb-8">
                    <h3 class="font-bold text-gray-800 mb-6 flex items-center gap-2"><i data-lucide="plus-circle"></i> Novo Lançamento no Banco D1</h3>
                    <div class="grid grid-cols-4 gap-4">
                        <input type="text" id="tax-name" placeholder="Tipo (ex: DAS)" class="bg-gray-50 border border-gray-300 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        <input type="number" id="tax-amount" placeholder="Valor R$" class="bg-gray-50 border border-gray-300 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        <input type="date" id="tax-date" class="bg-gray-50 border border-gray-300 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        <button onclick="gravarImposto()" class="bg-blue-600 text-white rounded-xl font-bold shadow-md hover:shadow-lg transition">GRAVAR NO BANCO</button>
                    </div>
                </div>

                <div class="google-card p-6 h-80">
                    <canvas id="taxChart"></canvas>
                </div>
            </div>

            <div id="view-notas" class="view-section">
                <div class="google-card p-8">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-2"><i data-lucide="file-check" class="text-blue-600"></i> Repositório de Notas</h2>
                    <p class="text-gray-500">Aguardando sincronização com a SEFAZ...</p>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 right-10 bg-white border-l-4 border-blue-500 shadow-2xl px-6 py-4 rounded-xl translate-x-[150%] transition-transform duration-500 flex items-center gap-4 z-50">
        <i data-lucide="info" class="text-blue-600"></i>
        <p class="text-sm font-bold text-gray-800" id="toast-msg"></p>
    </div>

    <script>
        lucide.createIcons();
        let myChart;
        const apiURL = ''; // Deixe vazio se o site e o worker estão no mesmo domínio

        function showNotification(msg, type) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.style.borderLeftColor = type === 'success' ? '#34a853' : '#1a73e8';
            toast.classList.remove('translate-x-[150%]');
            setTimeout(() => toast.classList.add('translate-x-[150%]'), 3000);
        }

        function switchView(viewName) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + viewName).classList.add('active');
            document.querySelectorAll('.sidebar-item').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-view="${viewName}"]`).classList.add('active');
        }

        async function handleCert(input) {
            if (input.files[0]) {
                const cnpj = prompt("Digite o CNPJ/CPF:");
                showNotification('Autenticando Certificado...', 'info');
                setTimeout(() => {
                    showNotification('DADOS GOV RECUPERADOS!', 'success');
                    sincronizarDashboard(cnpj);
                }, 2000);
            }
        }

        async function sincronizarDashboard(id = 'SandxCDD') {
            try {
                const res = await fetch(`/api/v1/sync/${id}`);
                const data = await res.json();
                document.getElementById('tax-value').innerText = 'R$ ' + data.tax_engine.total_das_pagar.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                document.getElementById('ia-insight').innerText = data.tax_engine.ia_insight;
                document.getElementById('sync-status').innerText = 'Última busca: CNPJ ' + id;
            } catch (e) { showNotification('Erro na sincronia D1', 'error'); }
        }

        async function gravarImposto() {
            const tipo = document.getElementById('tax-name').value;
            const valor = document.getElementById('tax-amount').value;
            const data = document.getElementById('tax-date').value;
            if(!tipo || !valor) return showNotification('Preencha os campos', 'error');

            const res = await fetch('/api/v1/add-tax', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tipo, valor: parseFloat(valor), vencimento: data })
            });
            if(res.ok) {
                showNotification('Gravado no D1 com sucesso!', 'success');
                sincronizarDashboard();
                document.getElementById('tax-name').value = '';
                document.getElementById('tax-amount').value = '';
            } else {
                showNotification('Erro ao gravar no banco', 'error');
            }
        }

        const ctx = document.getElementById('taxChart').getContext('2d');
        myChart = new Chart(ctx, { type: 'line', data: { labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'], datasets: [{ data: [1500, 2200, 1900, 3100, 4200, 3800], borderColor: '#1a73e8', tension: 0.4, fill: true, backgroundColor: 'rgba(26, 115, 232, 0.05)' }] }, options: { responsive: true, maintainAspectRatio: false } });
        
        sincronizarDashboard();
    </script>
</body>
</html>
