<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dna Tax AI | Sovereign Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');
        body { font-family: 'Google Sans', sans-serif; background: #f8f9fa; height: 100vh; overflow: hidden; }
        .google-card { background: white; border-radius: 12px; border: 1px solid #dadce0; box-shadow: 0 1px 2px rgba(60,64,67,0.3); }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; border-radius: 0 24px 24px 0; color: #5f6368; cursor: pointer; transition: 0.2s; }
        .sidebar-item.active { background: #e8f0fe; color: #1a73e8; font-weight: 500; }
        .kpi-fill { height: 100%; width: 0%; background: #1a73e8; transition: width 1s ease-in-out; }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-16 bg-white border-b flex items-center justify-between px-6 z-20">
        <div class="flex items-center gap-3">
            <i data-lucide="shield-check" class="text-blue-600"></i>
            <h1 class="text-lg font-medium text-gray-700">Dna Tax <span class="font-bold text-blue-600">Center AI</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <span id="geo-tag" class="text-[10px] font-mono text-gray-400">GEO: BUSCANDO...</span>
            <input type="text" id="main-search" placeholder="00.000.000/0000-00" class="border p-2 rounded-lg text-sm w-48 outline-none focus:border-blue-500">
            <button onclick="buscarGov()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-blue-700">BUSCAR GOV</button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <aside class="w-64 bg-white border-r py-6 pr-4">
            <nav>
                <div onclick="switchView('dash')" id="n-dash" class="sidebar-item active"><i data-lucide="layout-grid"></i> Dashboard</div>
                <div onclick="switchView('clm')" id="n-clm" class="sidebar-item"><i data-lucide="key"></i> Saúde Certificado</div>
                <div onclick="switchView('config')" id="n-config" class="sidebar-item"><i data-lucide="settings"></i> Configurações</div>
            </nav>
        </aside>

        <section class="flex-1 p-8 overflow-y-auto">
            <div id="v-dash" class="view-section active">
                <div class="grid grid-cols-3 gap-6 mb-8">
                    <div class="google-card p-6 border-t-4 border-t-blue-500">
                        <h3 class="text-gray-500 text-xs font-bold uppercase">Total D1 (Imutável)</h3>
                        <p class="text-4xl font-bold mt-2" id="total-txt">R$ 0,00</p>
                    </div>
                    <div class="google-card p-6 border-t-4 border-t-green-500">
                        <h3 class="text-gray-500 text-xs font-bold uppercase">Status Autenticação</h3>
                        <p id="status-auth" class="mt-2 text-sm font-bold text-orange-500 italic">Aguardando Handshake...</p>
                    </div>
                    <div class="google-card p-6 border-t-4 border-t-indigo-500">
                        <h3 class="text-indigo-600 text-xs font-bold uppercase">Eficácia (Latência)</h3>
                        <div class="h-1.5 w-full bg-gray-100 rounded-full mt-4"><div id="kpi-bar" class="kpi-fill"></div></div>
                        <p class="text-xs mt-1 font-mono" id="kpi-val">0ms</p>
                    </div>
                </div>

                <div class="google-card p-8 mb-8">
                    <div class="flex gap-4">
                        <input type="text" id="t-name" placeholder="Tipo" class="border p-3 rounded-xl w-full">
                        <input type="number" id="t-amount" placeholder="Valor" class="border p-3 rounded-xl w-full">
                        <input type="date" id="t-date" class="border p-3 rounded-xl w-full">
                        <button onclick="gravar()" class="bg-blue-600 text-white px-8 rounded-xl font-bold">GRAVAR</button>
                    </div>
                </div>
                <div class="google-card p-6 h-64"><canvas id="mainChart"></canvas></div>
            </div>

            <div id="v-clm" class="view-section">
                <div class="google-card p-8">
                    <h2 class="text-xl font-bold mb-4">Métricas de Soberania (SandxCDD)</h2>
                    <div id="clm-log" class="bg-black text-green-400 p-6 rounded-lg font-mono text-xs h-80 overflow-y-auto">
                        > Sistema pronto...
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-10 right-10 bg-white border-l-4 border-blue-500 shadow-xl px-6 py-4 rounded-lg translate-x-[150%] transition-all duration-500 z-50">
        <p class="text-sm font-bold" id="toast-txt"></p>
    </div>

    <script>
        lucide.createIcons();
        const api = 'https://govdna.contatodroppfy.workers.dev';
        let myGeo = "0,0";

        // MÁSCARA GOV (Extraída do sso.acesso.gov.br)
        document.getElementById('main-search').oninput = (e) => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length <= 11) {
                e.target.value = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
            } else {
                e.target.value = v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
            }
        };

        // GEOLOCALIZAÇÃO (AuditTrail)
        function getGeo() {
            navigator.geolocation.getCurrentPosition(p => {
                myGeo = `${p.coords.latitude.toFixed(4)},${p.coords.longitude.toFixed(4)}`;
                document.getElementById('geo-tag').innerText = `COORD: ${myGeo}`;
            });
        }

        function switchView(n) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('v-'+n).classList.add('active');
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            document.getElementById('n-'+n).classList.add('active');
        }

        function notify(m, type) {
            const t = document.getElementById('toast');
            document.getElementById('toast-txt').innerText = m;
            t.style.borderLeftColor = type === 'success' ? '#34a853' : '#1a73e8';
            t.classList.remove('translate-x-[150%]');
            setTimeout(() => t.classList.add('translate-x-[150%]'), 3000);
        }

        // BUSCADOR COM KPI DE LATÊNCIA
        async function buscarGov() {
            const val = document.getElementById('main-search').value.replace(/\D/g,'');
            const start = performance.now();
            notify("Handshake TLS 1.2 iniciado...", "info");

            try {
                const r = await fetch(`${api}/api/busca/${val}`);
                const d = await r.json();
                const lat = (performance.now() - start).toFixed(0);

                if(d.cnpj || d.nome) {
                    document.getElementById('status-auth').innerText = d.razao_social || d.nome;
                    document.getElementById('status-auth').className = "mt-2 text-sm font-bold text-green-600";
                    document.getElementById('kpi-val').innerText = `${lat}ms`;
                    document.getElementById('kpi-bar').style.width = '100%';
                    
                    document.getElementById('clm-log').innerHTML += `<br>> [${new Date().toLocaleTimeString()}] SYNC OK: ${val} | LATENCY: ${lat}ms`;
                    notify("Sincronizado!", "success");
                }
            } catch(e) { notify("Erro de conexão", "error"); }
        }

        async function gravar() {
            const data = {
                tipo: document.getElementById('t-name').value,
                valor: parseFloat(document.getElementById('t-amount').value),
                vencimento: document.getElementById('t-date').value,
                location: myGeo
            };
            try {
                const r = await fetch(`${api}/api/add-tax`, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                if(r.ok) {
                    notify("Fato Gravado e Assinado!", "success");
                    load();
                }
            } catch(e) { notify("Erro no Ledger", "error"); }
        }

        async function load() {
            try {
                const r = await fetch(`${api}/api/sync`);
                const d = await r.json();
                document.getElementById('total-txt').innerText = `R$ ${d.total.toLocaleString('pt-BR')}`;
            } catch(e) {}
        }

        window.onload = () => { getGeo(); load(); 
            new Chart(document.getElementById('mainChart'), { type: 'line', data: { labels: ['Q1','Q2','Q3','Q4'], datasets:[{label:'KPIs', data:[12,19,3,5], borderColor:'#1a73e8'}] } });
        };
    </script>
</body>
</html>
