<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dna Tax AI | Sovereign Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto+Mono:wght@400;700&display=swap');
        
        :root {
            --google-blue: #1a73e8;
            --google-green: #34a853;
            --bg-light: #f8f9fa;
        }

        body {
            font-family: 'Google Sans', sans-serif;
            background-color: var(--bg-light);
            color: #202124;
            height: 100vh;
            overflow: hidden;
        }

        .google-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 1px 3px rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
            border: 1px solid #dadce0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .google-card:hover {
            box-shadow: 0 8px 16px rgba(60,64,67,0.2);
            transform: translateY(-2px);
        }

        .sidebar-item {
            transition: all 0.2s;
            border-radius: 0 24px 24px 0;
            cursor: pointer;
            border: none;
            background: transparent;
            font-weight: 500;
        }

        .sidebar-item.active {
            background-color: #e8f0fe;
            color: var(--google-blue);
        }

        .view-section { display: none; animation: slideUp 0.4s ease-out; }
        .view-section.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Efeito de carregamento para busca */
        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 shrink-0 z-10">
        <div class="flex items-center gap-4">
            <div class="bg-blue-600 p-2 rounded-xl text-white shadow-lg shadow-blue-200">
                <i data-lucide="shield-check"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">Dna Tax <span class="text-blue-600">AI</span></h1>
                <p class="text-[10px] text-gray-400 font-mono font-bold">SOVEREIGN GOV NODE</p>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <div class="relative">
                <input type="text" id="cnpjSearch" placeholder="Pesquisar CNPJ / CPF..." 
                       class="bg-gray-100 border-none rounded-full px-6 py-2 text-sm w-80 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button onclick="buscarCartaoCNPJ()" class="absolute right-2 top-1 bg-blue-600 text-white p-1.5 rounded-full hover:bg-blue-700 transition">
                    <i data-lucide="search" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-600 border-2 border-white shadow-md"></div>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        
        <aside class="w-64 bg-white border-r border-gray-200 py-6 pr-4 shrink-0">
            <nav class="space-y-1">
                <button onclick="switchView('dashboard')" id="nav-dashboard" class="sidebar-item active w-full flex items-center gap-4 py-3 px-6 text-gray-600">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </button>
                <button onclick="switchView('notas')" id="nav-notas" class="sidebar-item w-full flex items-center gap-4 py-3 px-6 text-gray-600">
                    <i data-lucide="file-text" class="w-5 h-5"></i> Notas & Ledger
                </button>
                <button onclick="switchView('config')" id="nav-config" class="sidebar-item w-full flex items-center gap-4 py-3 px-6 text-gray-600">
                    <i data-lucide="settings" class="w-5 h-5"></i> Configurações
                </button>
            </nav>
        </aside>

        <div class="flex-1 overflow-y-auto p-8 bg-[#f8f9fa]">
            
            <div id="view-dashboard" class="view-section active">
                <div class="grid grid-cols-12 gap-8 mb-8">
                    
                    <div class="col-span-4 google-card p-8 border-t-4 border-t-blue-500">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-gray-500 text-sm font-bold uppercase tracking-wider">Total a Pagar</h3>
                            <i data-lucide="landmark" class="text-blue-200"></i>
                        </div>
                        <p class="text-5xl font-bold text-gray-800 mb-6" id="tax-value">R$ 0,00</p>
                        <button onclick="showNotification('QR Code Pix solicitado', 'success')" 
                                class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition active:scale-95">
                            GERAR GUIA PIX
                        </button>
                    </div>

                    <div id="cnpjResultCard" class="col-span-8 google-card p-8 border-l-8 border-l-green-500 hidden relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4 opacity-5"><i data-lucide="building-2" size="120"></i></div>
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <span class="bg-green-100 text-green-700 status-badge">Empresa Ativa</span>
                                <h2 id="res-razao" class="text-2xl font-bold text-gray-800 mt-2 italic">Razão Social Carregada</h2>
                            </div>
                            <button onclick="document.getElementById('cnpjResultCard').classList.add('hidden')" class="text-gray-300 hover:text-gray-500">
                                <i data-lucide="x"></i>
                            </button>
                        </div>
                        <div class="grid grid-cols-3 gap-6 text-sm">
                            <div class="p-3 bg-gray-50 rounded-lg">
                                <p class="text-[10px] font-bold text-gray-400 uppercase">CNPJ Oficial</p>
                                <p id="res-cnpj" class="font-mono font-bold">--</p>
                            </div>
                            <div class="p-3 bg-gray-50 rounded-lg">
                                <p class="text-[10px] font-bold text-gray-400 uppercase">Data de Abertura</p>
                                <p id="res-abertura" class="font-bold">--</p>
                            </div>
                            <div class="p-3 bg-gray-50 rounded-lg">
                                <p class="text-[10px] font-bold text-gray-400 uppercase">Porte</p>
                                <p id="res-porte" class="font-bold">DEMAIS</p>
                            </div>
                            <div class="col-span-3 p-3 bg-blue-50/50 rounded-lg">
                                <p class="text-[10px] font-bold text-blue-400 uppercase">Atividade Principal</p>
                                <p id="res-atividade" class="text-blue-800 font-medium">--</p>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="google-card p-8 mb-8">
                    <div class="flex items-center gap-3 mb-8">
                        <button onclick="gravarImposto()" class="bg-blue-600 text-white p-2 rounded-full shadow-lg shadow-blue-200 hover:scale-110 transition">
                            <i data-lucide="plus" class="w-6 h-6"></i>
                        </button>
                        <h3 class="text-lg font-bold text-gray-800">Registrar Novo Fato no Ledger D1</h3>
                    </div>
                    <div class="grid grid-cols-4 gap-6">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-500 ml-1 uppercase">Tipo de Tributo</label>
                            <input type="text" id="tax-name" placeholder="Ex: DAS, ISS..." 
                                   class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-500 ml-1 uppercase">Valor Real (R$)</label>
                            <input type="number" id="tax-amount" placeholder="0.00" 
                                   class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-500 ml-1 uppercase">Vencimento</label>
                            <input type="date" id="tax-date" 
                                   class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="flex items-end">
                            <button onclick="gravarImposto()" class="w-full h-[52px] bg-blue-600 text-white rounded-xl font-bold uppercase tracking-widest text-xs hover:bg-blue-700 transition">
                                Gravar no Banco
                            </button>
                        </div>
                    </div>
                </div>

                <div class="google-card p-6 h-80">
                    <canvas id="taxChart"></canvas>
                </div>
            </div>

            <div id="view-notas" class="view-section">
                <div class="google-card overflow-hidden">
                    <div class="p-8 border-b border-gray-100 flex justify-between items-center">
                        <h2 class="text-2xl font-bold flex items-center gap-3"><i data-lucide="layers" class="text-blue-600"></i> Auditoria D1</h2>
                        <button onclick="sincronizarDashboard()" class="text-blue-600 hover:rotate-180 transition-all duration-500">
                            <i data-lucide="refresh-cw"></i>
                        </button>
                    </div>
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-500 text-[11px] font-bold uppercase tracking-widest">
                            <tr>
                                <th class="p-5">Documento / Tipo</th>
                                <th class="p-5">Vencimento</th>
                                <th class="p-5">Status</th>
                                <th class="p-5 text-right">Valor Consolidado</th>
                            </tr>
                        </thead>
                        <tbody id="real-table-body" class="divide-y divide-gray-50">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <div id="toast" class="fixed bottom-10 right-10 bg-white border-l-4 border-blue-500 shadow-2xl px-8 py-4 rounded-2xl translate-x-[150%] transition-all duration-500 flex items-center gap-4 z-50">
        <div id="toast-icon-box" class="p-2 bg-blue-50 rounded-full text-blue-600">
            <i data-lucide="info"></i>
        </div>
        <p class="text-sm font-bold text-gray-800" id="toast-msg"></p>
    </div>

    <script>
        lucide.createIcons();
        let myChart;

        // --- NAVEGAÇÃO SPA ---
        function switchView(viewName) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + viewName).classList.add('active');
            document.querySelectorAll('.sidebar-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById('nav-' + viewName).classList.add('active');
        }

        // --- BUSCADOR REAL GOV ---
        async function buscarCartaoCNPJ() {
            const cnpj = document.getElementById('cnpjSearch').value.replace(/\D/g, '');
            if(!cnpj) return;

            showNotification("Varrendo base da Receita Federal...", "info");
            
            try {
                const res = await fetch(\`/api/v1/busca-cnpj/\${cnpj}\`);
                const data = await res.json();
                
                if(data.cnpj) {
                    document.getElementById('cnpjResultCard').classList.remove('hidden');
                    document.getElementById('res-razao').innerText = data.razao_social;
                    document.getElementById('res-cnpj').innerText = data.cnpj;
                    document.getElementById('res-status').innerText = data.descricao_situacao_cadastral;
                    document.getElementById('res-abertura').innerText = data.data_inicio_atividade;
                    document.getElementById('res-atividade').innerText = data.cnae_fiscal_descricao;
                    showNotification("Cartão CNPJ localizado com sucesso!", "success");
                } else {
                    showNotification("CNPJ não encontrado.", "error");
                }
            } catch (e) {
                showNotification("Erro na conexão governamental.", "error");
            }
        }

        // --- SINCRONIA D1 ---
        async function sincronizarDashboard() {
            try {
                const res = await fetch(\`\${window.location.origin}/api/v1/sync/SandxCDD\`);
                const data = await res.json();
                
                document.getElementById('tax-value').innerText = 'R$ ' + data.tax_engine.total_das_pagar.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                document.getElementById('ia-insight').innerText = data.tax_engine.ia_insight;

                const body = document.getElementById('real-table-body');
                body.innerHTML = data.tax_engine.records.map(r => \`
                    <tr class="hover:bg-blue-50/30 transition">
                        <td class="p-5 font-bold text-gray-700">\${r.tipo_imposto}</td>
                        <td class="p-5 text-gray-500 font-mono text-xs">\${r.vencimento}</td>
                        <td class="p-5"><span class="bg-blue-100 text-blue-700 status-badge">Pendente</span></td>
                        <td class="p-5 text-right font-bold text-blue-600">R$ \${r.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                    </tr>
                \`).join('');

                myChart.data.datasets[0].data = data.tax_engine.chart_data;
                myChart.update();
            } catch (e) { console.log("Sync Error"); }
        }

        // --- GRAVAÇÃO ---
        async function gravarImposto() {
            const tipo = document.getElementById('tax-name');
            const valor = document.getElementById('tax-amount');
            const data = document.getElementById('tax-date');

            if(!tipo.value || !valor.value) return showNotification("Dados incompletos.", "error");

            try {
                const res = await fetch(\`\${window.location.origin}/api/v1/add-tax\`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo: tipo.value, valor: parseFloat(valor.value), vencimento: data.value })
                });

                if(res.ok) {
                    showNotification("Fato Injetado no Ledger!", "success");
                    tipo.value = ''; valor.value = '';
                    sincronizarDashboard();
                }
            } catch (e) { showNotification("Erro de rede.", "error"); }
        }

        function showNotification(msg, type) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.style.borderLeftColor = type === 'success' ? '#34a853' : (type === 'error' ? '#ea4335' : '#1a73e8');
            toast.classList.remove('translate-x-[150%]');
            setTimeout(() => toast.classList.add('translate-x-[150%]'), 4000);
        }

        const ctx = document.getElementById('taxChart').getContext('2d');
        myChart = new Chart(ctx, { type: 'line', data: { labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'], datasets: [{ data: [0,0,0,0,0,0], borderColor: '#1a73e8', tension: 0.4, fill: true, backgroundColor: 'rgba(26, 115, 232, 0.05)', borderWidth: 3 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });

        window.onload = sincronizarDashboard;
    </script>
</body>
</html>
